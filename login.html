<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Social Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Loading Animation -->
    <div id="loader" class="loader-container">
        <div class="loader-spinner"></div>
    </div>

    <div class="dashboard-wrapper">


        <div class="login-container"
            style="display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; z-index: 5;">
            <div class="glass-card new-post-st"
                style="width: 100%; max-width: 400px; padding: 40px; text-align: center;">
                <div class="app-logo-section" style="margin-bottom: 20px;">
                    <a href="login.html">
                        <img src="images/stackly jpg.webp" alt="Stackly Logo" class="app-logo" style="width: 120px;">
                    </a>
                </div>
                <h2 style="margin-bottom: 20px; font-weight: 800;">Welcome Back</h2>

                <form action="404.html" method="GET" style="display: flex; flex-direction: column; gap: 15px;">
                    <input type="email" placeholder="Email Address" required
                        style="padding: 12px 15px; border-radius: 10px; border: 1px solid #cbd5e1; outline: none; font-family: inherit;">
                    <input type="password" placeholder="Password" required
                        style="padding: 12px 15px; border-radius: 10px; border: 1px solid #cbd5e1; outline: none; font-family: inherit;">

                    <button type="submit" class="gradient-btn"
                        style="padding: 12px; font-size: 1rem; border-radius: 10px; margin-top: 10px; font-weight: 700; color: white;">Log
                        In</button>
                </form>

                <div style="margin-top: 25px; display: flex; flex-direction: column; gap: 10px; font-size: 0.9rem;">
                    <a href="forgot_password.html" style="color: var(--primary); font-weight: 600;">Forgot Password?</a>
                    <span style="color: var(--text-muted);">Don't have an account? <a href="sign_up.html"
                            style="color: var(--primary); font-weight: 600;">Create an Account</a></span>
                </div>

                <div style="margin-top: 20px;">
                    <a href="index.html"
                        style="color: var(--text-muted); font-size: 0.85rem; text-decoration: underline;"><i
                            class="fa-solid fa-arrow-left"></i> Back to Home</a>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
